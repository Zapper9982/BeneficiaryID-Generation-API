name: TestCase Coverage Check - Comment
on:
  workflow_run:
    workflows: ["TestCase Coverage Check - Build"]
    types: [completed]
permissions:
  contents: read
  pull-requests: write
  actions: read
jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download PR metadata
        uses: actions/github-script@v7
        id: pr
        with:
          script: |
            const prs = github.event.workflow_run.pull_requests;
            if (!prs || prs.length === 0) throw new Error('No PR found');
            core.setOutput('number', prs[0].number);
      - name: Download JaCoCo Report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report-${{ steps.pr.outputs.number }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Compare JaCoCo Coverage
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          title: 📊 Code Coverage Report
          comment-type: pr_comment
